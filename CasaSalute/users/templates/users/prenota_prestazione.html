{% extends 'base.html' %}

{% block content %}
<div class="white_container">
    <h2>Prestazioni Infermieristiche</h2>

    <form method="POST" class="form-control" style="background-color:#4eb381">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary" style="width: 20%">Registra Prestazione</button>
    </form>

    <a href="{% url 'pagina_paziente' %}" class="btn btn-primary" style="margin-top: 20px; display: inline-block; width: 20%;">Annulla e torna alla tua pagina</a>
</div>
{% endblock %}
