{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta informazioni -->
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Titolo della pagina -->
    <title>{% block title %}KMB Health Center{% endblock %}</title>

    <!-- Fogli di stile -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
    <style>
        /* Stili personalizzati */
        .header_top_section .call_text a { color: rgb(9, 133, 71); }
        .appointment_taital span { color:rgb(9, 133, 71); }
        .doctores_box { background-color: #f5f5f5; padding: 15px; border-radius: 10px; }
        .read_bt a, .readmore_bt a { background-color: rgb(9, 133, 71); color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; }
        .footer_section { background-color: #2c3e50; color: white; padding: 30px 0; text-align: center; }
        .footer_section a { color: rgb(9, 133, 71); text-decoration: none; }
    </style>
</head>

<body>
    <!-- header pagina con barra di navigazione -->
    {% include 'header.html' %}

    <!-- contenuto della pagina -->
    <main id="content">
        {% block content %}
        {% endblock %}
    </main>

    <!-- footer -->
    {% include 'footer.html' %}

    <!-- Script JS -->
    <script src="{% static 'js/jquery.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
</body>
</html>
