{% extends 'base.html' %}
{% block title %}Contact us{% endblock %}

{% block content %}
<div class="row">
    <h2 align="center" style="color: white;">Contattaci</h2>
    <p align="center" style="color: white;">Per informazioni o appuntamenti, chiamaci al <strong>039 12345678</strong> o compila il modulo qui sotto.</p>

    <form style="color: black; background-color: white; padding: 20px; border-radius: 10px; width: 50%; margin: auto;">
        <label for="name">Nome:</label>
        <input type="text" id="name" name="name" required style="width: 100%; padding: 8px; margin-bottom: 10px;"><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required style="width: 100%; padding: 8px; margin-bottom: 10px;"><br>

        <label for="message">Messaggio:</label>
        <textarea id="message" name="message" rows="4" required style="width: 100%; padding: 8px;"></textarea><br>

        <button type="submit" style="background-color: #111111; color: white; padding: 10px 15px; border: none; cursor: pointer; margin-top: 10px;">Invia</button>
    </form>
    <h1 style="background-color: #111111;"> </h1>
</div>
{% endblock %}
